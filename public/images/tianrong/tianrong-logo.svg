<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 820" role="img" aria-labelledby="logo-title">
  <title id="logo-title">天戎科技</title>
  <defs>
    <filter id="transparent-white" color-interpolation-filters="sRGB">
      <feColorMatrix
        type="matrix"
        values="0 0 0 0 0.68
                0 0 0 0 0.69
                0 0 0 0 0.71
                -1 -1 -1 0 3"
      />
    </filter>
  </defs>
  <image
    href="/images/tianrong/tianrong-logo.png"
    width="1080"
    height="820"
    preserveAspectRatio="none"
    filter="url(#transparent-white)"
  />
</svg>
